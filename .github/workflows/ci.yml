name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: reference tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The reference is standard-library only — no install step, by design.
      - name: Conformance tests (deterministic, offline)
        working-directory: reference
        run: python tests/test_kernel.py

      - name: End-to-end mission demo
        working-directory: reference
        run: python examples/run_mission.py
